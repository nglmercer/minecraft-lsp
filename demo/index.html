<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Autocomplete Demo</title>
  <style>
    body {
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
      margin: 0;
    }
    h1 { margin-bottom: 30px; }
    .demo-container {
      width: 600px;
      padding: 20px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
    }
    p { color: #8b949e; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>Minecraft Autocomplete</h1>
  <div class="demo-container">
    <p>Type <code>/give</code> or <code>/tell</code> to see it in action.</p>
    <minecraft-autocomplete id="editor"></minecraft-autocomplete>
  </div>

  <!-- In a real app we'd use a bundler, here we just show the setup -->
  <script type="module" src="./main.ts"></script>
</body>
</html>
